<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}AI面接システム{% endblock %} | AI RECOMEN Admin</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <i class="fas fa-robot"></i>
        <span>AI RECOMEN</span>
      </div>
      <nav class="sidebar-nav">
        <a href="/admin" class="nav-item {% if active_page == 'dashboard' %}active{% endif %}">
          <i class="fas fa-chart-line"></i><span>ダッシュボード</span>
        </a>
        <div class="nav-section-label">マスター管理</div>
        <a href="/admin/companies" class="nav-item {% if active_page == 'companies' %}active{% endif %}">
          <i class="fas fa-building"></i><span>企業情報管理</span>
        </a>
        <a href="/admin/accounts" class="nav-item {% if active_page == 'accounts' %}active{% endif %}">
          <i class="fas fa-users-cog"></i><span>企業アカウント管理</span>
        </a>
        <a href="/admin/jobs" class="nav-item {% if active_page == 'jobs' %}active{% endif %}">
          <i class="fas fa-briefcase"></i><span>求人情報管理</span>
        </a>
        <div class="nav-section-label">採用管理</div>
        <a href="/admin/applicants" class="nav-item {% if active_page == 'applicants' %}active{% endif %}">
          <i class="fas fa-user-tie"></i><span>応募者管理</span>
        </a>
        <a href="/admin/interview-history" class="nav-item {% if active_page == 'interviews' %}active{% endif %}">
          <i class="fas fa-comments"></i><span>面接履歴管理</span>
        </a>
        <div class="nav-section-label">システム</div>
        <a href="/admin/privacy" class="nav-item {% if active_page == 'privacy' %}active{% endif %}">
          <i class="fas fa-shield-alt"></i><span>プライバシーポリシー</span>
        </a>
        <a href="/admin/logout" class="nav-item nav-logout">
          <i class="fas fa-sign-out-alt"></i><span>ログアウト</span>
        </a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="top-bar">
        <div class="top-bar-left">
          <button class="sidebar-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">
            <i class="fas fa-bars"></i>
          </button>
          <h1 class="page-title">{% block page_title %}{% endblock %}</h1>
        </div>
        <div class="top-bar-right">
          <span class="admin-badge"><i class="fas fa-user-shield"></i> {{ admin.name }}</span>
        </div>
      </header>
      <div class="content-body">
        {% block content %}{% endblock %}
      </div>
    </main>
  </div>
  <script src="/static/js/admin.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
