{% extends "base.html" %}
{% block title %}{{ 'アカウント編集' if account else 'アカウント追加' }}{% endblock %}
{% block page_title %}{{ '企業アカウント編集' if account else '企業アカウント追加' }}{% endblock %}

{% block content %}
<div class="card form-card">
  <form method="POST" action="{{ '/admin/accounts/' ~ account.id ~ '/edit' if account else '/admin/accounts/new' }}">
    <div class="form-grid">
      <div class="form-group form-full">
        <label>所属企業 <span class="required">*</span></label>
        <select name="company_id" required>
          <option value="">選択してください</option>
          {% for c in companies %}
          <option value="{{ c.id }}" {% if account and account.company_id == c.id %}selected{% endif %}>{{ c.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>氏名</label>
        <input type="text" name="name" value="{{ account.name if account else '' }}">
      </div>
      <div class="form-group">
        <label>権限</label>
        <select name="role">
          <option value="user" {% if account and account.role == 'user' %}selected{% endif %}>一般</option>
          <option value="manager" {% if account and account.role == 'manager' %}selected{% endif %}>マネージャー</option>
          <option value="admin" {% if account and account.role == 'admin' %}selected{% endif %}>管理者</option>
        </select>
      </div>
      <div class="form-group">
        <label>メールアドレス <span class="required">*</span></label>
        <input type="email" name="email" value="{{ account.email if account else '' }}" required>
      </div>
      <div class="form-group">
        <label>パスワード {% if not account %}<span class="required">*</span>{% else %}<small>(空欄の場合は変更なし)</small>{% endif %}</label>
        <input type="password" name="password" {% if not account %}required{% endif %} placeholder="••••••••" minlength="8">
      </div>
      {% if account %}
      <div class="form-group">
        <label>ステータス</label>
        <label class="toggle-label">
          <input type="checkbox" name="is_active" {% if account.is_active %}checked{% endif %}>
          <span class="toggle-text">有効</span>
        </label>
      </div>
      {% endif %}
    </div>
    <div class="form-actions">
      <a href="/admin/accounts" class="btn btn-outline">キャンセル</a>
      <button type="submit" class="btn btn-primary">
        <i class="fas fa-save"></i> {{ '更新する' if account else '登録する' }}
      </button>
    </div>
  </form>
</div>
{% endblock %}
